<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Σύνδεση — ART RESTORATION ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo"><i class="bi bi-columns-gap"></i></div>
    <h4 class="text-center fw-bold mb-1">ART RESTORATION</h4>
    <p class="text-center text-muted mb-4" style="font-size:13px">Σύστημα Διαχείρισης Εταιρείας</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'danger' if category in ('error','danger') else category }} mb-3">
      {{ message }}
    </div>
    {% endfor %}
    {% endwith %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">
      <div class="mb-3">
        <label class="form-label">Όνομα Χρήστη</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="π.χ. admin"
                 required autofocus autocomplete="username">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Κωδικός Πρόσβασης</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control"
                 required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Σύνδεση
      </button>
    </form>

    <p class="text-center text-muted mt-4 mb-0" style="font-size:11px">
      ART RESTORATION AE &copy; {{ 2026 }}
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
