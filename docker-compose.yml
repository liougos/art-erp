version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-art_erp}
      POSTGRES_USER: ${POSTGRES_USER:-art_erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-art_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-art_erp}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-art_erp}
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: production
    volumes:
      - uploads:/app/static/uploads
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/static/uploads:ro
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  uploads:
